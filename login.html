<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Merchant Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 450px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        .auth-toggle {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e2e8f0;
        }
        .auth-toggle button {
            flex: 1;
            padding: 0.75rem 0;
            background: none;
            border: none;
            color: #64748b;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
        }
        .auth-toggle button.active {
            color: #4f46e5;
        }
        .auth-toggle button.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #4f46e5;
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container login-container">
        <div class="login-card">
            <header style="text-align: center; margin-bottom: 1.5rem;">
                <h1>🔐 Access System</h1>
                <p>Welcome to Merchant Control</p>
            </header>
            
            <div class="auth-toggle">
                <button type="button" id="toggleLoginMode" class="active">Login</button>
                <button type="button" id="toggleRegisterMode">Register</button>
            </div>

            <form id="authForm" class="request-form">
                <div class="form-group" id="nameGroup" style="display: none;">
                    <label>Full Name</label>
                    <input type="text" id="authName" placeholder="Your Name">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="authEmail" required placeholder="user@merchant.com">
                </div>
                
                <div class="form-group" style="margin-top: 1rem;">
                    <label>Password</label>
                    <input type="password" id="authPassword" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-primary mt-4" style="width: 100%;" id="authSubmitBtn">
                    Login <span class="loader hidden" id="authLoader"></span>
                </button>
                <div id="statusMessage" class="status-message mt-2" style="text-align:center;"></div>
            </form>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
