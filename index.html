<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Control Access Request</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <!-- Request Form Section -->
        <main class="glass-panel form-section" style="width: 100%; max-width: 800px; margin: 0 auto;">
            <header>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <h1 style="color: #1e293b; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;">Request Access</h1>
                        <p style="color: #64748b; font-size: 0.95rem;">Submit your details to request Merchant Control access.</p>
                    </div>
                    <div style="display:flex; gap:1rem; align-items:center;">
                        <a href="admin.html" class="btn-outline" style="text-decoration:none;">⚙️ Admin</a>
                        <button type="button" id="logoutBtn" class="btn-outline">Logout</button>
                    </div>
                </div>
            </header>
            
            <form id="accessRequestForm" class="request-form" style="display:block;">
                <!-- Store Info -->
                <div class="glass-panel-inner global-section">
                    <h3 class="section-title">🏬 ข้อมูลร้านค้า (ใช้ร่วมกัน)</h3>
                    <div class="inner-grid">
                        <div class="form-group">
                            <label>รหัสร้านค้า (ID)</label>
                            <input type="text" id="storeId" required placeholder="ระบุตัวเลข (สูงสุด 5 หลัก)" maxlength="5">
                        </div>
                        <div class="form-group">
                            <label>ชื่อร้านค้า</label>
                            <input type="text" id="storeName" required placeholder="ระบุชื่อร้านค้า">
                        </div>
                    </div>
                </div>

                <!-- User Entry Panel -->
                <div class="user-entry-panel">
                    <div class="panel-header">
                        <h4 class="user-entry-title">👤 เพิ่มผู้ใช้งานคนที่ <span id="currentUserIndex">1</span></h4>
                        <button type="button" class="btn-import">📄 Import CSV</button>
                    </div>
                    
                    <div class="inner-grid mt-4">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="usernameInput" placeholder="ระบุ Username" required>
                        </div>
                        <div class="form-group">
                            <label>อีเมล</label>
                            <input type="email" id="emailInput" placeholder="email@ex.com" required>
                        </div>
                    </div>
                    
                    <div class="form-group mt-4">
                        <label>บทบาท (Role)</label>
                        <div class="role-grid">
                            <label class="role-option"><input type="radio" name="roleInput" value="Admin" required><span>Admin</span></label>
                            <label class="role-option"><input type="radio" name="roleInput" value="IT"><span>IT</span></label>
                            <label class="role-option"><input type="radio" name="roleInput" value="All Role"><span>All Role</span></label>
                            <label class="role-option"><input type="radio" name="roleInput" value="CEO"><span>CEO</span></label>
                            <label class="role-option"><input type="radio" name="roleInput" value="sales"><span>sales</span></label>
                            <label class="role-option"><input type="radio" name="roleInput" value="manager"><span>manager</span></label>
                            <label class="role-option"><input type="radio" name="roleInput" value="accounting"><span>accounting</span></label>
                        </div>
                    </div>

                    <div class="advanced-permissions mt-4">
                        <button type="button" id="togglePermissions" class="toggle-btn">
                            <span>⚙️ กำหนดสิทธิ์รายเมนู (Advanced)</span>
                            <span class="chevron" id="chevronIcon">▼</span>
                        </button>
                        
                        <div id="permissionsWrapper" class="permissions-wrapper hidden pt-3">
                            <div class="permissions-container" id="permissionsContainer">
                                
                            </div>
                        </div>
                    </div>

                    <div class="panel-actions mt-4" style="text-align:right;">
                        <button type="submit" id="addToQueueBtn" class="btn-primary">+ เพิ่มลงรายการ</button>
                    </div>
                </div>

                <!-- Staged Users List Viewer -->
                <div id="queuedUsersList" class="queued-users-list">
                    <!-- Queue badges injected here -->
                </div>

                <!-- Form Footer -->
                <div class="form-footer mt-4">
                    <div class="queue-status">รอส่งทั้งหมด <strong id="queueCount">0</strong> รายการ</div>
                    <div class="footer-buttons">
                        <button type="button" id="clearBtn" class="btn-outline">ล้างทั้งหมด</button>
                        <button type="button" id="submitAllBtn" class="btn-primary" disabled>ยืนยันทั้งหมด <span class="loader hidden" id="submitLoader"></span></button>
                    </div>
                </div>
                <div id="statusMessage" class="status-message"></div>
            </form>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
